<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love 🤍</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}
body{
overflow:hidden;
background:black;
color:white;
}
.bg{
position:fixed;
inset:0;
background:url('photo2.jpg') center/cover no-repeat;
z-index:-2;
}
.dark{
position:fixed;
inset:0;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(4px);
z-index:-1;
}
.page{
width:100%;
height:100vh;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
padding:20px;
animation:fade 1s;
overflow:auto;
}
.active{ display:flex; }
@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}
.card{
width:95%;
max-width:430px;
background:rgba(255,255,255,0.12);
border:1px solid rgba(255,255,255,0.18);
backdrop-filter:blur(15px);
padding:30px;
border-radius:30px;
text-align:center;
box-shadow:0 0 40px rgba(255,192,203,0.25);
}
h1{font-size:30px;margin-bottom:15px;}
.subtitle{font-size:16px;opacity:0.9;line-height:1.7;}
.navs{
display:flex;
justify-content:space-between;
margin-top:25px;
gap:10px;
}
.btn{
padding:13px 24px;
border:none;
border-radius:18px;
background:#ffd6e5;
font-weight:600;
cursor:pointer;
font-size:15px;
transition:0.3s;
}
.btn:hover{transform:scale(1.05);}
.code-box{
display:flex;
justify-content:center;
gap:10px;
margin:25px 0;
}
.code-box input{
width:48px;
height:55px;
border:none;
border-radius:12px;
font-size:22px;
text-align:center;
background:white;
}
.question{font-size:24px;margin-bottom:25px;line-height:1.6;}
.option{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:15px;
background:#ffd4df;
font-size:16px;
cursor:pointer;
transition:0.3s;
}
.option:hover{transform:scale(1.03);}
.correct{background:#8effb0 !important;}
.wrong{background:#ff8f8f !important;}
.score{margin-top:20px;font-size:18px;}
.timer{font-size:26px;line-height:1.7;margin-top:20px;}
.memory-box{
border:2px dashed rgba(255,255,255,0.7);
padding:40px;
border-radius:25px;
margin-top:25px;
cursor:pointer;
}
.memory-img{
width:100%;
border-radius:20px;
margin-bottom:20px;
}
.typing{
text-align:left;
line-height:2;
white-space:pre-wrap;
font-size:15px;
}
.gallery{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
margin-top:20px;
}
.flip{
width:145px;
height:190px;
perspective:1000px;
cursor:pointer;
}
.flip-inner{
width:100%;
height:100%;
position:relative;
transition:transform 0.8s;
transform-style:preserve-3d;
}
.flip.flipped .flip-inner{
transform:rotateY(180deg);
}
.front,.back{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:18px;
overflow:hidden;
}
.front{
background:#ffc8da;
display:flex;
justify-content:center;
align-items:center;
font-size:45px;
}
.back{
transform:rotateY(180deg);
}
.back img{
width:100%;
height:100%;
object-fit:cover;
}
.envelope{
width:260px;
height:180px;
background:#ffbfd2;
position:relative;
margin:auto;
cursor:pointer;
border-radius:15px;
}
.envelope:before{
content:'';
position:absolute;
top:0;
left:0;
border-left:130px solid transparent;
border-right:130px solid transparent;
border-top:90px solid #ffd6e3;
}
.letter{
display:none;
margin-top:25px;
background:white;
color:black;
padding:25px;
border-radius:20px;
text-align:left;
line-height:2;
max-height:320px;
overflow:auto;
white-space:pre-wrap;
}
.call-screen{
position:fixed;
inset:0;
background:black;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:99999;
}
.caller{font-size:34px;margin-bottom:50px;}
.accept{
width:95px;
height:95px;
border-radius:50%;
background:#59ff80;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
cursor:pointer;
animation:pulse 1s infinite;
}
@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}
.proposal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
text-align:center;
padding:30px;
font-size:35px;
z-index:999999;
line-height:1.8;
}
.hearts{
position:fixed;
inset:0;
pointer-events:none;
overflow:hidden;
z-index:9999999;
}
.heart{
position:absolute;
font-size:30px;
animation:float 6s linear infinite;
}
@keyframes float{
from{transform:translateY(100vh);opacity:1;}
to{transform:translateY(-10vh);opacity:0;}
}
</style>
</head>
